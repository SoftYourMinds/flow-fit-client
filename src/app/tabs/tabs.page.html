<ion-tabs>
  <ion-tab-bar slot="bottom" class="glass-tab-bar">
    <ion-tab-button tab="clients" href="/tabs/clients">
      <ion-icon aria-hidden="true" name="people"></ion-icon>
      <ion-label>Клієнти</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon aria-hidden="true" name="calendar"></ion-icon>
      <ion-label>Розклад</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="reports" href="/tabs/reports">
      <ion-icon aria-hidden="true" name="stats-chart"></ion-icon>
      <ion-label>Звіти</ion-label>
    </ion-tab-button>

    <ion-tab-button (click)="openMoreMenu($event)">
      <ion-icon aria-hidden="true" name="ellipsis-horizontal-circle-outline"></ion-icon>
      <ion-label>Більше</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
