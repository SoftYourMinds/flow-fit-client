<ion-header>
  <ion-toolbar>
    <ion-title>Локації</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="createLocation()">
        <ion-icon name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @if (isLoading()) {
    <ion-progress-bar type="indeterminate"></ion-progress-bar>
  } @else {
    <ion-list>
      @for (loc of locations(); track loc.id) {
        <ion-item-sliding>
          <ion-item>
            <ion-icon slot="start" [name]="loc.type === 'OUTDOOR' ? 'leaf' : 'barbell'" style="color: #829368"></ion-icon>
            <ion-label>
              <h2>{{ loc.name }}</h2>
              <p>{{ loc.type }} @if (loc.address) { <span>- {{ loc.address }}</span> }</p>
            </ion-label>
          </ion-item>

          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="deleteLocation(loc.id)">
              Видалити
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      } @empty {
        <ion-item lines="none">
          <ion-label class="ion-text-center" color="medium">
            Немає локацій.
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
