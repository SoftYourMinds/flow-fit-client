<ion-header>
  <ion-toolbar>
    <ion-title>Клієнти</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openCreateModal()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (isLoading()) {
    <ion-progress-bar type="indeterminate"></ion-progress-bar>
  } @else {
    <ion-list>
      @for (client of clients(); track client.id) {
        <ion-item [routerLink]="['/tabs/clients', client.id]" detail="true">
          <ion-avatar slot="start">
            <div style="background: #FFB3A7; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4A3034; font-weight: bold;">
              {{ client.fullName[0] }}
            </div>
          </ion-avatar>
          <ion-label>
            <h2>{{ client.fullName }}</h2>
            @if (client.goal) {
              <p>{{ client.goal }}</p>
            }
          </ion-label>
        </ion-item>
      } @empty {
        <ion-item lines="none">
          <ion-label class="ion-text-center" color="medium">
            Немає клієнтів. Створіть першого!
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
