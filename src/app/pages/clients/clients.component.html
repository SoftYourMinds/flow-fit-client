<ion-header>
  <ion-toolbar>
    <ion-title>Клієнти</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="createClient()">
        <ion-icon name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar (ionInput)="onSearch($event)" placeholder="Пошук за ім'ям..." mode="ios"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @if (isLoading()) {
    <ion-progress-bar type="indeterminate"></ion-progress-bar>
  } @else {
    <ion-list>
      @for (client of clients(); track client.id) {
        <ion-item (click)="openClientCabinet(client)" detail="true" button>
          <ion-avatar slot="start">
            <div style="background: var(--ion-color-tertiary); width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 1.2rem; box-shadow: 0 2px 6px rgba(214,167,122,0.3);">
              {{ client.fullName[0] }}
            </div>
          </ion-avatar>
          <ion-label>
            <h2>{{ client.fullName }}</h2>
            @if (client.goal) {
              <p><ion-icon name="flag-outline" style="vertical-align: middle; margin-right: 4px;"></ion-icon>{{ client.goal }}</p>
            }
          </ion-label>
        </ion-item>
      } @empty {
        <ion-item lines="none">
          <ion-label class="ion-text-center" color="medium">
            Немає клієнтів. Створіть першого!
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
