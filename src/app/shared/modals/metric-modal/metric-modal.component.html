<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Нові заміри та вага</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    <div class="row-2">
      <div class="form-group flex-1">
        <ion-label class="form-label">Вага (кг)</ion-label>
        <ion-item lines="none" class="custom-input-item">
          <ion-icon name="scale-outline" slot="start" color="secondary"></ion-icon>
          <ion-input type="number" [(ngModel)]="weight" placeholder="75.5"></ion-input>
        </ion-item>
      </div>

      <div class="form-group flex-1">
        <ion-label class="form-label">% Жиру</ion-label>
        <ion-item lines="none" class="custom-input-item">
          <ion-icon name="analytics-outline" slot="start" color="secondary"></ion-icon>
          <ion-input type="number" [(ngModel)]="bodyFatPercentage" placeholder="18.5"></ion-input>
        </ion-item>
      </div>
    </div>

    <div class="form-group ion-margin-top">
      <ion-label class="form-label">Об'єми тіла (груди / талія / стегна)</ion-label>
      <ion-item lines="none" class="custom-input-item">
        <ion-icon name="body-outline" slot="start" color="secondary"></ion-icon>
        <ion-input [(ngModel)]="measurements" placeholder="100 / 82 / 98 см"></ion-input>
      </ion-item>
    </div>

    <div class="form-group ion-margin-top">
      <ion-label class="form-label">Примітка</ion-label>
      <ion-item lines="none" class="custom-input-item textarea-item">
        <ion-textarea [(ngModel)]="note" rows="2" placeholder="Заміри зроблено вранці натщесерце..."></ion-textarea>
      </ion-item>
    </div>

    <div class="ion-margin-top ion-padding-top">
      <ion-button 
        expand="block" 
        shape="round" 
        color="secondary" 
        class="submit-btn" 
        (click)="confirm()" 
        [disabled]="!weight && !bodyFatPercentage && !measurements.trim()">
        Зберегти заміри
      </ion-button>
    </div>
  </div>
</ion-content>
