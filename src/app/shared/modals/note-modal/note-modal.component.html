<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ note ? 'Редагувати нотатку' : 'Нова нотатка' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    <div class="form-group">
      <div class="header-with-action">
        <ion-label class="form-label">Текст нотатки</ion-label>
        <ion-button fill="clear" size="small" (click)="triggerFileUpload()" [disabled]="isUploading">
          <ion-icon name="attach-outline" slot="start"></ion-icon> 
          {{ isUploading ? 'Завантаження...' : 'Прикріпити файл' }}
        </ion-button>
      </div>
      
      <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*,video/*" hidden>

      <!-- Quill Editor -->
      <div class="editor-wrapper">
        <quill-editor 
          [(ngModel)]="text" 
          [modules]="quillModules" 
          placeholder="Напишіть деталі про тренування..."
          [styles]="{height: '150px'}">
        </quill-editor>
      </div>
    </div>

    <!-- Attachments Preview -->
    @if (links.length > 0) {
      <div class="form-group ion-margin-top attachments-group">
        <ion-label class="form-label">Вкладення</ion-label>
        <div class="attachments-list">
          @for (link of links; track trackByIndex($index)) {
            <div class="attachment-item">
              <div style="position: relative; cursor: pointer; height: 100%; display: flex; align-items: center;" (click)="openMedia(link)">
                @if (isVideo(link)) {
                  <video [src]="link" class="attachment-preview" style="background: #000; object-fit: cover;" preload="metadata"></video>
                  <ion-icon name="play-circle" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; color: white; opacity: 0.8;"></ion-icon>
                } @else {
                  <img [src]="link" alt="Вкладення" class="attachment-preview" style="object-fit: cover;">
                }
              </div>
              <ion-button fill="clear" color="danger" size="small" (click)="removeLink($index); $event.stopPropagation();" class="remove-btn">
                <ion-icon name="close-circle"></ion-icon>
              </ion-button>
            </div>
          }
        </div>
      </div>
    }

    <div class="ion-margin-top ion-padding-top">
      <ion-button 
        expand="block" 
        shape="round" 
        color="primary" 
        class="submit-btn" 
        (click)="confirm()" 
        [disabled]="!text || !text.trim() || isUploading">
        Зберегти нотатку
      </ion-button>
    </div>
  </div>
</ion-content>
